[GLOBAL]
github_token_env = GH_TOKEN
log_dir = logs/cron
max_issues_per_run = 10
debug = false

[SQUAD_MADRID]
name = Squad Madrid
repositories = Squad_Madrid/ProjectA
backlog_labels = backlog, ready
in_progress_labels = in-progress
blocked_labels = blocked
detect_light_interval = 15
detect_deep_interval = 360
todo_executor_interval = 10
enable_detect_light = true
enable_detect_deep = true
enable_todo_executor = true

[SQUAD_LONDRES]
name = Squad Londres
repositories = Squad_Londres/ProjectA
backlog_labels = backlog
in_progress_labels = in-progress
blocked_labels = blocked
detect_light_interval = 15
detect_deep_interval = 360
todo_executor_interval = 10
enable_detect_light = true
enable_detect_deep = true
enable_todo_executor = true